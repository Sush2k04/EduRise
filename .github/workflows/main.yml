name: EduRise Workflow

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backend Dependencies
        run: |
          cd edurise-backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd edurise-frontend
          npm install

      - name: Build Frontend
        run: |
          cd edurise-frontend
          npm run build
