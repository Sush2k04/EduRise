name: Overall CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check-code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for large files
      run: |
        find . -type f -size +100M -not -path "./.git/*" | wc -l
    
    - name: Verify repository structure
      run: |
        echo "Checking required directories..."
        test -d "edurise-backend" && echo "✓ Backend directory found"
        test -d "edurise-frontend" && echo "✓ Frontend directory found"
        test -f "edurise-backend/package.json" && echo "✓ Backend package.json found"
        test -f "edurise-frontend/package.json" && echo "✓ Frontend package.json found"

  backend-check:
    needs: check-code-quality
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'edurise-backend/package-lock.json'
    
    - name: Install backend dependencies
      working-directory: ./edurise-backend
      run: npm ci
    
    - name: Backend linting (if applicable)
      working-directory: ./edurise-backend
      run: npm run lint --if-present
      continue-on-error: true

  frontend-check:
    needs: check-code-quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'edurise-frontend/package-lock.json'
    
    - name: Install frontend dependencies
      working-directory: ./edurise-frontend
      run: npm ci
    
    - name: Frontend linting
      working-directory: ./edurise-frontend
      run: npm run lint
      continue-on-error: true
    
    - name: Build frontend
      working-directory: ./edurise-frontend
      run: npm run build
